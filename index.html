.background {

  z-index: -1;
}

.square {

  height: 100%;
  animation: move 10s infinite alternate;
}

@keyframes move {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* Contenido principal */
.container {
  text-align: center;
  backdrop-filter: blur(10px);
  padding: 40px;
  border-radius: 20px;
}

/* Título */
h1 {
  font-size: 60px;
  margin-bottom: 40px;
}

/* Botones */
.btn {
  display: inline-block;
  padding: 15px 30px;
  margin: 10px;
  font-size: 18px;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
  border: none;
}

/* Botón normal */
.create {
  background: rgba(0,0,0,0.5);
  color: white;
}

.create:hover {
  transform: scale(1.1);
  background: rgba(0,0,0,0.7);
}

/* Botón premium */
.premium {

}

.premium:hover {
