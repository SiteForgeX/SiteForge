
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SiteForge</title>

<style>
body {
  margin:0;
  font-family: Arial;
  color:white;
  text-align:center;
  overflow:hidden;
}

/* Fondo */
.bg {
  position:absolute;
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns: repeat(6,1fr);
  grid-template-rows: repeat(6,1fr);
  z-index:-1;
}
.bg div { width:100%; height:100%; }
.bg div:nth-child(odd){background:#4da6ff;}
.bg div:nth-child(even){background:#ff4d4d;}

/* UI */
.container {
  margin-top:100px;
}

button {
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.create { background:#333; color:white; }
.my { background:#555; color:white; }

/* Modal */
.modal {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
}
.modal-content {
  background:#111;
  padding:20px;
  margin:100px auto;
  width:300px;
}

.web { margin:10px 0; }
</style>
</head>

<body>

<div class="bg">
  <!-- muchos cuadrados -->
  <div></div><div></div><div></div><div></div><div></div><div></div>
  <div></div><div></div><div></div><div></div><div></div><div></div>
  <div></div><div></div><div></div><div></div><div></div><div></div>
  <div></div><div></div><div></div><div></div><div></div><div></div>
</div>

<div class="container">
  <h1>SiteForge</h1>

  <button class="create" onclick="goEditor()">🚀 Crear sitio</button>
  <button class="my" onclick="openWebs()">📂 Mis sitios</button>

  <p>Support: Hyisx98754@GMAIL.COM</p>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Mis sitios</h3>
    <div id="list"></div>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script>
function goEditor(){
  location.href="editor.html";
}

function openWebs(){
  let sites = JSON.parse(localStorage.getItem("sites")) || [];
  let list = document.getElementById("list");
  list.innerHTML="";

  sites.forEach((site,i)=>{
    let div=document.createElement("div");
    div.className="web";

    div.innerHTML=`
      <strong>${site.name}</strong><br>
      <button onclick='previewSite(${JSON.stringify(site.content)})'>Ver</button>
      <button onclick='deleteSite(${i})'>Eliminar</button>
    `;

    list.appendChild(div);
  });

  document.getElementById("modal").style.display="block";
}

function previewSite(content){
  let win=window.open();
  win.document.write("<html><body>"+content+"</body></html>");
}

function deleteSite(i){
  let sites = JSON.parse(localStorage.getItem("sites")) || [];
  sites.splice(i,1);
  localStorage.setItem("sites",JSON.stringify(sites));
  openWebs();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
