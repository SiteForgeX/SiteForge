
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiteForge</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  color:white;
  overflow-x:hidden;
  background:black;
}

/* NAVBAR */
.nav{
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  z-index:10;
}

.nav h2{margin-left:10px;}
.nav button{
  margin-right:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* BACKGROUND GRID */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  display:grid;
  grid-template-columns:repeat(12,1fr);
  z-index:-1;
}

.bg div{
  height:100vh;
  animation:fade 5s infinite alternate;
}

.bg div:nth-child(odd){background:#111;}
.bg div:nth-child(even){background:#222;}

@keyframes fade{
  from{opacity:0.6;}
  to{opacity:1;}
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:80px;
}

.hero p{
  opacity:0.7;
  margin:20px;
}

.btn{
  padding:15px 25px;
  margin:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:18px;
}

.create{background:#333;color:white;}
.my{background:#555;color:white;}

/* FEATURES */
.features{
  padding:100px 20px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:40px;
}

.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#111;
  padding:20px;
  border-radius:15px;
  width:350px;
  max-height:400px;
  overflow:auto;
}

/* FOOTER */
.footer{
  padding:50px;
  text-align:center;
  background:#000;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="nav">
  <h2>SiteForge</h2>
  <div>
    <button onclick="goEditor()">Create</button>
    <button onclick="openWebs()">My Sites</button>
  </div>
</div>

<div class="hero">
  <h1>SiteForge</h1>
  <p>Create websites in seconds</p>
  <button class="btn create" onclick="goEditor()">🚀 Start</button>
  <button class="btn my" onclick="openWebs()">📂 My Sites</button>
</div>

<div class="features">
  <h2>Features</h2>
  <div class="grid">
    <div class="card">⚡ Fast builder</div>
    <div class="card">🎨 Custom design</div>
    <div class="card">💾 Save sites</div>
    <div class="card">📱 Responsive</div>
  </div>
</div>

<div class="footer">
  Support: Hyisx98754@GMAIL.COM
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>My Sites</h3>
    <div id="list"></div>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
// BG
let bg=document.getElementById("bg");
for(let i=0;i<120;i++){
  let d=document.createElement("div");
  bg.appendChild(d);
}

// NAV
function goEditor(){
  location.href="editor.html";
}

// SITES
function openWebs(){
  let sites=JSON.parse(localStorage.getItem("sites"))||[];
  let list=document.getElementById("list");
  list.innerHTML="";

  sites.forEach((s,i)=>{
    let div=document.createElement("div");
    div.innerHTML=`
      <strong>${s.name}</strong><br>
      <button onclick='preview(${JSON.stringify(s.content)})'>View</button>
      <button onclick='deleteSite(${i})'>Delete</button>
    `;
    list.appendChild(div);
  });

  document.getElementById("modal").style.display="flex";
}

function preview(content){
  let w=window.open();
  w.document.write("<html><body>"+content+"</body></html>");
}

function deleteSite(i){
  let sites=JSON.parse(localStorage.getItem("sites"))||[];
  sites.splice(i,1);
  localStorage.setItem("sites",JSON.stringify(sites));
  openWebs();
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
