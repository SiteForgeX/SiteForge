
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Editor - SiteForge</title>

<style>
body {
  margin:0;
  display:flex;
  font-family:Arial;
}

/* SIDEBAR */
.sidebar {
  width:250px;
  background:#111;
  color:white;
  padding:15px;
  height:100vh;
  overflow:auto;
}

.sidebar h2 {
  margin-bottom:10px;
}

.sidebar button {
  width:100%;
  margin:5px 0;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#333;
  color:white;
}

/* CANVAS */
.canvas {
  flex:1;
  padding:20px;
  background:#f5f5f5;
  overflow:auto;
}

.block {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px dashed #aaa;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>SiteForge</h2>

  <button onclick="addText()">📝 Text</button>
  <button onclick="addImage()">🖼 Image</button>
  <button onclick="addButton()">🔘 Button</button>
  <button onclick="addHTML()">💻 HTML</button>

  <hr>

  <button onclick="save()">💾 Save</button>
  <button onclick="clearCanvas()">🗑 Clear</button>
</div>

<div class="canvas" id="canvas"></div>

<script src="app.js"></script>

</body>
</html>
